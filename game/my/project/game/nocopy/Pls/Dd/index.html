<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>AR Roller Coaster JS Only</title>
    
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/drawing_utils/drawing_utils.js" crossorigin="anonymous"></script>

    <style>
        /* Стили прямо здесь, чтобы не плодить файлы */
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; background: #000; }
        #canvas_container { position: relative; width: 100vw; height: 100vh; }
        canvas { width: 100%; height: 100%; object-fit: cover; }
        
        #overlay {
            position: absolute; top: 10px; left: 10px; 
            color: #00ffff; font-family: monospace; pointer-events: none;
            background: rgba(0,0,0,0.5); padding: 10px; border-radius: 5px;
            z-index: 10;
        }
        .error-msg { color: #ff4444; font-weight: bold; }
    </style>
</head>
<body>

    <div id="canvas_container">
        <div id="overlay">
            <div id="info">Инициализация...</div>
            <div id="err_log" class="error-msg"></div>
        </div>
        <video id="v" style="display:none;" playsinline></video>
        <canvas id="c"></canvas>
    </div>

    <script>
        // Проверка на HTTPS сразу
        if (location.protocol !== 'https:' && location.hostname !== 'localhost') {
            document.getElementById('err_log').innerText = "ОШИБКА: НУЖЕН HTTPS ДЛЯ КАМЕРЫ!";
        }

        const video = document.getElementById('v');
        const canvas = document.getElementById('c');
        const ctx = canvas.getContext('2d');
        const info = document.getElementById('info');

        let menu = { x: 0.5, y: 0.5, active: false, visible: false };

        // Настройка нейросети
        const hands = new Hands({locateFile: (file) => `https://cdn.jsdelivr.net/npm/@mediapipe/hands/${file}`});
        
        hands.setOptions({
            maxNumHands: 1,
            modelComplexity: 1,
            minDetectionConfidence: 0.7,
            minTrackingConfidence: 0.7
        });

        hands.onResults((results) => {
            info.innerText = "Система активна. Наведи на руку.";
            ctx.save();
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            ctx.drawImage(results.image, 0, 0, canvas.width, canvas.height);

            if (results.multiHandLandmarks && results.multiHandLandmarks.length > 0) {
                const hand = results.multiHandLandmarks[0];

                // Рисуем голубую "перчатку"
                drawConnectors(ctx, hand, HAND_CONNECTIONS, {color: '#00ffff66', lineWidth: 2});
                drawLandmarks(ctx, hand, {color: '#00ffff', lineWidth: 1, radius: 2});

                // Логика захвата меню (пальцы 8 и 12)
                const p1 = hand[8];
                const p2 = hand[12];
                const dist = Math.hypot(p1.x - p2.x, p1.y - p2.y);

                if (dist < 0.05) {
                    menu.visible = true;
                    menu.active = true;
                    menu.x = p1.x;
                    menu.y = p1.y - 0.1;
                } else {
                    menu.active = false;
                }

                if (menu.visible) drawMenu(menu.x * canvas.width, menu.y * canvas.height, menu.active);
            }
            ctx.restore();
        });

        function drawMenu(x, y, active) {
            ctx.fillStyle = "rgba(0, 20, 30, 0.9)";
            ctx.strokeStyle = active ? "#fff" : "#00fbff";
            ctx.lineWidth = 3;
            ctx.shadowBlur = active ? 20 : 5;
            ctx.shadowColor = "#00ffff";

            // Табличка
            ctx.beginPath();
            ctx.roundRect(x - 90, y - 50, 180, 100, 15);
            ctx.fill();
            ctx.stroke();

            // Текст
            ctx.shadowBlur = 0;
            ctx.fillStyle = "#fff";
            ctx.font = "bold 14px Arial";
            ctx.textAlign = "center";
            ctx.fillText("ROLLER COASTER", x, y - 10);
            ctx.fillStyle = "#00ffff";
            ctx.fillText(active ? "ПЕРЕМЕЩЕНИЕ" : "УДЕРЖИВАЙТЕ", x, y + 20);
        }

        // Запуск камеры (Задняя камера)
        async function start() {
            try {
                const stream = await navigator.mediaDevices.getUserMedia({
                    video: { facingMode: "environment" }
                });
                video.srcObject = stream;
                video.play();

                const camera = new Camera(video, {
                    onFrame: async () => {
                        canvas.width = window.innerWidth;
                        canvas.height = window.innerHeight;
                        await hands.send({image: video});
                    }
                });
                camera.start();
            } catch (e) {
                document.getElementById('err_log').innerText = "Камера недоступна: " + e.message;
            }
        }

        start();
    </script>
</body>
</html>
