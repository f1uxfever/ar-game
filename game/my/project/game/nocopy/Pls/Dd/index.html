<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Flux AR: Coaster Builder</title>
    
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/drawing_utils/drawing_utils.js" crossorigin="anonymous"></script>

    <style>
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; background: #000; font-family: 'Segoe UI', sans-serif; }
        #canvas_output { width: 100vw; height: 100vh; object-fit: cover; }
        #ui { position: absolute; top: 20px; left: 20px; z-index: 10; pointer-events: none; }
        .status-box { background: rgba(0, 20, 40, 0.8); color: #00ffff; padding: 12px; border-radius: 10px; border-left: 5px solid #00ffff; box-shadow: 0 0 15px rgba(0,255,255,0.3); }
        #video_input { display: none; }
    </style>
</head>
<body>

    <div id="ui">
        <div class="status-box">
            <b>SYSTEM: FLUX_AR</b><br>
            СТАТУС: <span id="st_val">ИНИЦИАЛИЗАЦИЯ...</span><br>
            ЖЕСТ: <span id="gst_val">ПОИСК РУКИ</span>
        </div>
    </div>

    <video id="video_input" playsinline></video>
    <canvas id="canvas_output"></canvas>

    <script type="module">
        const video = document.getElementById('video_input');
        const canvas = document.getElementById('canvas_output');
        const ctx = canvas.getContext('2d');
        const st = document.getElementById('st_val');
        const gst = document.getElementById('gst_val');

        let menu = { x: 0.5, y: 0.5, isVisible: false, isGrabbed: false };

        const hands = new Hands({locateFile: (f) => `https://cdn.jsdelivr.net/npm/@mediapipe/hands/${f}`});
        
        hands.setOptions({
            maxNumHands: 1,
            modelComplexity: 1,
            minDetectionConfidence: 0.7,
            minTrackingConfidence: 0.7
        });

        hands.onResults((results) => {
            st.innerText = "ONLINE";
            ctx.save();
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            ctx.drawImage(results.image, 0, 0, canvas.width, canvas.height);

            if (results.multiHandLandmarks && results.multiHandLandmarks.length > 0) {
                const h = results.multiHandLandmarks[0];
                
                // РИСУЕМ СИНЮЮ ПЕРЧАТКУ
                drawConnectors(ctx, h, HAND_CONNECTIONS, {color: 'rgba(0, 255, 255, 0.6)', lineWidth: 4});
                drawLandmarks(ctx, h, {color: '#ffffff', lineWidth: 1, radius: 2});

                // ЛОГИКА ЖЕСТА (Указательный + Средний)
                const dist = Math.hypot(h[8].x - h[12].x, h[8].y - h[12].y);
                
                if (dist < 0.05) {
                    menu.isVisible = true;
                    menu.isGrabbed = true;
                    menu.x = h[8].x;
                    menu.y = h[8].y - 0.15; // Позиция меню чуть выше пальцев
                    gst.innerText = "МЕНЮ УДЕРЖИВАЕТСЯ";
                } else {
                    menu.isGrabbed = false;
                    gst.innerText = "ГОТОВ К ЗАХВАТУ";
                }

                if (menu.isVisible) drawFancyMenu(menu.x * canvas.width, menu.y * canvas.height, menu.isGrabbed);
            } else {
                gst.innerText = "РУКА НЕ В КАДРЕ";
            }
            ctx.restore();
        });

        function drawFancyMenu(x, y, active) {
            ctx.save();
            ctx.shadowBlur = active ? 20 : 5;
            ctx.shadowColor = "#00ffff";
            ctx.fillStyle = "rgba(5, 15, 30, 0.95)";
            ctx.strokeStyle = active ? "#ffffff" : "#00ffff";
            ctx.lineWidth = 3;

            // Сама табличка
            ctx.beginPath();
            ctx.roundRect(x - 100, y - 50, 200, 100, 15);
            ctx.fill();
            ctx.stroke();

            // Текст
            ctx.shadowBlur = 0;
            ctx.fillStyle = "#fff";
            ctx.textAlign = "center";
            ctx.font = "bold 16px Arial";
            ctx.fillText("FLUX COASTER", x, y - 10);
            ctx.font = "12px Arial";
            ctx.fillStyle = active ? "#00ff00" : "#00ffff";
            ctx.fillText(active ? "ПЕРЕМЕЩЕНИЕ..." : "ЗАХВАТИТЕ ПАЛЬЦАМИ", x, y + 20);
            ctx.restore();
        }

        async function initCamera() {
            try {
                const stream = await navigator.mediaDevices.getUserMedia({
                    video: { facingMode: "environment" } // ЗАДНЯЯ КАМЕРА
                });
                video.srcObject = stream;
                await video.play();
                
                const camera = new Camera(video, {
                    onFrame: async () => {
                        canvas.width = window.innerWidth;
                        canvas.height = window.innerHeight;
                        await hands.send({image: video});
                    }
                });
                camera.start();
            } catch (e) {
                st.innerText = "ОШИБКА КАМЕРЫ: НУЖЕН HTTPS";
            }
        }

        initCamera();
    </script>
</body>
</html>
